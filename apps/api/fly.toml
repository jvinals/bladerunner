# Fly.io configuration for Bladerunner API
# Public-facing NestJS + Socket.IO service.

app = "bladerunner-edgehealth-api"
primary_region = "iad"

# Build context must be the **repository root** (Dockerfile COPYs pnpm-workspace, packages/, apps/api/).
# From root: `fly deploy . --config apps/api/fly.toml`
# Dockerfile path is relative to this file's directory — do not use `apps/api/...` or Fly resolves `apps/api/apps/api/...`.
[build]
  dockerfile = "Dockerfile.production"

[env]
  NODE_ENV = "production"
  API_PORT = "3001"
  API_HOST = "0.0.0.0"
  BROWSER_WORKER_URL = "ws://bladerunner-browser-worker.flycast:3002"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2
