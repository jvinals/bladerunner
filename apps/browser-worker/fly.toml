# Fly.io configuration for Bladerunner Browser Worker
# Internal-only service (Flycast) — no public IP. API reaches it via
# bladerunner-browser-worker.flycast:3002 over Fly private networking.

app = "bladerunner-browser-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.production"

[env]
  WORKER_PORT = "3002"

# Flycast requires force_https = false; WireGuard encrypts private traffic.
[http_service]
  internal_port = 3002
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
