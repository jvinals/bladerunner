# Fly.io configuration for Bladerunner Browser Worker
# Internal-only service (Flycast) — no public IP. API reaches it via
# bladerunner-browser-worker.flycast over Fly private networking.
#
# Deploy from **repository root**: `fly deploy . --config apps/browser-worker/fly.toml`
# (build context is the monorepo root, same pattern as `apps/api/fly.toml`).

app = "bladerunner-browser-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.production"

[env]
  WORKER_PORT = "3002"
  CDP_PORT = "3003"
  # Hostname API uses for chromium.connect CDP URL — match Fly Proxy (.flycast), not .internal (no DNS when scaled to zero).
  WORKER_EXTERNAL_HOST = "bladerunner-browser-worker.flycast"

# Control channel (port 3002) — Flycast for auto-start/stop.
[http_service]
  internal_port = 3002
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# CDP/Playwright channel (port 3003) — TCP service; API reaches it via same app.flycast hostname on port 3003.
[[services]]
  internal_port = 3003
  protocol = "tcp"
  [[services.ports]]
    port = 3003

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
