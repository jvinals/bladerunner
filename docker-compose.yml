services:
  # Optional local DB: docker compose --profile local-db up -d postgres
  postgres:
    profiles:
      - local-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bladerunner
      POSTGRES_PASSWORD: bladerunner
      POSTGRES_DB: bladerunner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bladerunner -d bladerunner']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - API_PORT=3001
      - NODE_ENV=development
      - BROWSER_WORKER_URL=ws://browser-worker:3002
    env_file:
      - .env
    volumes:
      - ./apps/api/src:/app/apps/api/src
    depends_on:
      - browser-worker
    command: pnpm --filter @bladerunner/api start:dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./apps/web/src:/app/apps/web/src
    depends_on:
      - api
    command: pnpm --filter @bladerunner/web dev --host 0.0.0.0

  browser-worker:
    build:
      context: .
      dockerfile: apps/browser-worker/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - WORKER_PORT=3002
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN

volumes:
  pgdata:
