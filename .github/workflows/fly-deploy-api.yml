# Deploy NestJS API to Fly.io when main changes (or manual run).
# Requires repo secret: FLY_API_TOKEN (Fly dashboard → Access Tokens, or `fly tokens create`).
#
# Build context is the repository root — matches apps/api/Dockerfile.production COPY paths.

name: Deploy API to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.npmrc'
      - '.dockerignore'
      - '.github/workflows/fly-deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy bladerunner-edgehealth-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy . --config apps/api/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
