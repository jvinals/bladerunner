# Deploy self-hosted Skyvern to Fly.io when config changes (or manual run).
# Uses the official Skyvern Docker image from ECR -- no local build step.
# Requires repo secret: FLY_API_TOKEN.

name: Deploy Skyvern to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/skyvern/**'
      - '.github/workflows/fly-deploy-skyvern.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy bladerunner-skyvern
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config apps/skyvern/fly.toml -a bladerunner-skyvern --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
