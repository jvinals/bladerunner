name: Fly Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-browser-worker:
    name: Deploy Browser Worker
    runs-on: ubuntu-latest
    concurrency: deploy-browser-worker
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config apps/browser-worker/fly.toml
        working-directory: apps/browser-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKER }}

  deploy-api:
    name: Deploy API
    needs: deploy-browser-worker
    runs-on: ubuntu-latest
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config apps/api/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
